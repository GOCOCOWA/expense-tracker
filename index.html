<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro | 雲端資產管理</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <div class="logo-icon">F</div>
                <span>FinanceFlow <strong>Pro</strong></span>
            </div>
            <div id="auth-section">
                <button id="auth-btn" class="btn-connect">Connect Google Sheets</button>
            </div>
        </div>
    </nav>

    <main class="app-layout">
        <aside class="control-panel">
            <div class="glass-card">
                <h3><i class="icon">➕</i> 新增交易</h3>
                <form id="expense-form">
                    <div class="input-grid">
                        <div class="field">
                            <label>交易日期</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="field">
                            <label>收支類型</label>
                            <select id="type" required>
                                <option value="支出">支出</option>
                                <option value="收入">收入</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>分類項目</label>
                            <select id="category" required disabled>
                                <option value="" disabled selected>連線中...</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>交易金額</label>
                            <div class="amount-input">
                                <span>NT$</span>
                                <input type="number" id="amount" placeholder="0" required>
                            </div>
                        </div>
                        <div class="field">
                            <label>支付方式</label>
                            <select id="payment" required disabled>
                                <option value="" disabled selected>連線中...</option>
                            </select>
                        </div>
                        <div class="field full">
                            <label>備註描述</label>
                            <input type="text" id="description" placeholder="輸入細節...">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="submit-btn">儲存至雲端</button>
                </form>
            </div>
        </aside>

        <section class="data-panel">
            <div class="dashboard-header">
                <div class="month-selector">
                    <label>分析期間</label>
                    <input type="month" id="month-filter">
                </div>
                <div class="kpi-summary">
                    <div class="kpi-mini">
                        <span class="label">本月結餘</span>
                        <span class="value" id="total-balance">NT$ 0</span>
                    </div>
                </div>
            </div>

            <div class="kpi-grid">
                <div class="kpi-card income">
                    <div class="kpi-info">
                        <span class="kpi-label">總收入</span>
                        <h2 id="total-income">NT$ 0</h2>
                    </div>
                    <div class="kpi-icon">↗</div>
                </div>
                <div class="kpi-card expense">
                    <div class="kpi-info">
                        <span class="kpi-label">總支出</span>
                        <h2 id="total-expense">NT$ 0</h2>
                    </div>
                    <div class="kpi-icon">↘</div>
                </div>
            </div>

            <div class="charts-row">
                <div class="visual-card main-chart">
                    <div class="card-head"><h4>每日支出趨勢</h4></div>
                    <div class="chart-box"><canvas id="trendChart"></canvas></div>
                </div>
                <div class="visual-card sub-chart">
                    <div class="card-head"><h4>分類比例</h4></div>
                    <div class="chart-box"><canvas id="categoryChart"></canvas></div>
                </div>
            </div>

            <div class="list-card">
                <div class="card-head"><h4>最近交易明細</h4></div>
                <div class="table-wrapper">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>分類</th>
                                <th>說明</th>
                                <th class="text-right">金額</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-list">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="app.js"></script>
</body>
</html>
